{% extends 'base.html' %}

{% block title %}Bénéficiaire{% endblock %}

{% block content %}

<h3 class="mb-4">Ajouter / Modifier un bénéficiaire</h3>

<form method="POST">
    {% csrf_token %}

    <div class="row">

        <div class="col-md-6 mb-3">
            <label>Nom</label>
            {{ form.first_name }}
        </div>

        <div class="col-md-6 mb-3">
            <label>Prénom</label>
            {{ form.last_name }}
        </div>

        <div class="col-md-6 mb-3">
            <label>Sexe</label>
            {{ form.gender }}
        </div>

        <div class="col-md-6 mb-3">
            <label>Âge</label>
            {{ form.age }}
        </div>

        <div class="col-md-6 mb-3">
            <label>Localisation</label>
            {{ form.region }}
        </div>

        <div class="col-md-6 mb-3">
            <label>Projet</label>
            {{ form.project }}
        </div>

    </div>

    <button class="btn btn-success">Enregistrer</button>
    <a href="{% url 'beneficiary_list' %}" class="btn btn-secondary">Annuler</a>

</form>

{% endblock %}
