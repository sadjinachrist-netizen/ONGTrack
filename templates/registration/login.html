{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>ONGTrack - Connexion</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="login-container">

    <div class="logo">
        <h4>SDT</h4>
    </div>

    <h3 class="title">ONGTrack - Connexion</h3>
    <p class="subtitle">SOLIDARITÉ DÉVELOPPEMENT TOGO</p>

    <form method="post">
        {% csrf_token %}

        <!-- Email -->
        <div class="mb-3">
            <label>Email</label>
            <input type="text" name="username" class="form-control" placeholder="nom@exemple.tg">
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Mot de passe</label>
            <input type="password" name="password" class="form-control">
        </div>

        <div class="mb-3 text-end">
            <a href="#">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn btn-green">Se connecter</button>

    </form>

    <p class="text-center mt-3">
        Besoin d'aide ? <a href="#">Contacter l'administrateur</a>
    </p>

</div>

</body>
</html>
